<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UniSync Sell</title>
  <link rel="stylesheet" href="/ui.css">
</head>
<body>
  <div class="shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main">
      <div class="topbar">
        <div>
          <h1>Sell / List Resource</h1>
          <div class="muted">Create a listing (stored in MySQL `Resource` table)</div>
        </div>
      </div>

      <div th:if="${error}" class="flash bad" th:text="${error}">Error</div>
      <div th:if="${success}" class="flash ok" th:text="${success}">Success</div>

      <div class="card" style="max-width: 820px;">
        <form method="post" action="/ui/sell">
          <label>Title</label>
          <input name="title" placeholder="E.g., Data Structures Book" required>

          <label>Description</label>
          <textarea name="description" placeholder="Short description..."></textarea>

          <div class="row">
            <div>
              <label>Condition</label>
              <input name="condition" placeholder="New / Good / Used" required>
            </div>
            <div>
              <label>Listing Type</label>
              <select id="type" name="type" required>
                <option value="SELL">SELL</option>
                <option value="LEND">LEND</option>
                <option value="BARTER">BARTER</option>
              </select>
            </div>
            <div id="priceWrap">
              <label>Price (SELL only)</label>
              <input id="price" name="price" type="number" step="0.01" min="0" value="0">
            </div>
            <div>
              <label>Category ID</label>
              <input name="categoryId" type="number" min="1" value="1" required>
            </div>
          </div>

          <div style="margin-top:12px;">
            <button type="submit">List Resource</button>
          </div>
        </form>
      </div>
      <script>
        (function () {
          const type = document.getElementById('type');
          const wrap = document.getElementById('priceWrap');
          const price = document.getElementById('price');
          function sync() {
            const isSell = type.value === 'SELL';
            wrap.style.display = isSell ? 'block' : 'none';
            price.required = isSell;
            if (!isSell) price.value = '0';
          }
          type.addEventListener('change', sync);
          sync();
        })();
      </script>
    </main>
  </div>
</body>
</html>
